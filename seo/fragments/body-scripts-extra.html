    <script>
      // Intercept Airtable requests so admin/business saves persist on local backend.
      (() => {
        const TABLE_BASE = "https://api.airtable.com/v0/app0120M8RAwOR635/tblM97NVRfmIPsxTh";
        const nativeFetch = window.fetch.bind(window);
        window.fetch = (input, init = {}) => {
          try {
            const originalUrl = typeof input === "string" ? input : input.url;
            if (originalUrl && originalUrl.startsWith(TABLE_BASE)) {
              const src = new URL(originalUrl);
              const suffix = src.pathname.replace("/v0/app0120M8RAwOR635/tblM97NVRfmIPsxTh", "");
              const targetUrl = `/api/airtable${suffix}${src.search}`;
              const forwarded = { ...init };
              if (forwarded.headers) {
                const headers = new Headers(forwarded.headers);
                headers.delete("authorization");
                forwarded.headers = headers;
              } else {
                forwarded.headers = {};
              }
              const sessionToken = localStorage.getItem("accessToken");
              if (sessionToken) {
                const headers = new Headers(forwarded.headers);
                headers.set("X-Pawsitively-Session", sessionToken);
                forwarded.headers = headers;
              }
              return nativeFetch(targetUrl, forwarded);
            }
          } catch {
            // Fallback to native fetch.
          }
          return nativeFetch(input, init);
        };
      })();
    </script>

    <script>
      (function () {
        var ORIGIN = "https://www.peedeepetcare.com";
        var SITE_TITLE = "Pet Services in Darlington & Florence SC | Pee Dee Pet Care";
        var SITE_DESCRIPTION =
          "Free pet services directory for Darlington & Florence, SC. Browse grooming, training, boarding, sitters and vet listings with reviews. Not a service provider.";
        var BLOG_INDEX_TITLE = "The Daily Wag | Pee Dee Pet Tips | Pee Dee Pet Care";
        var BLOG_INDEX_DESCRIPTION =
          "Pee Dee Pet Tips from Pee Dee Pet Care — local guides on grooming, boarding, training, and directory tips for Florence & Darlington, SC. Not a service provider.";
        var DEFAULT_OG_IMAGE = ORIGIN + "/share-card.jpg";
        var defaultSeo = {
          title: SITE_TITLE,
          description: SITE_DESCRIPTION,
          canonical: ORIGIN + "/",
          ogImage: DEFAULT_OG_IMAGE,
          ogType: "website",
        };
        var postsPromise = null;
        var CATEGORY_PAGE_KEYS = {
          grooming: "/grooming",
          training: "/training",
          boarding: "/boarding",
          sitters: "/sitters",
          vet: "/vet-care",
          products: "/products",
        };

        function categorySeoFromPathname() {
          var pathname = window.location.pathname.replace(/\/$/, "") || "/";
          if (window.__peedeeCategorySeo && window.__peedeeCategorySeo[pathname]) {
            return window.__peedeeCategorySeo[pathname];
          }
          return null;
        }

        function categorySeoFromPageKey(pageKey) {
          if (!pageKey) return null;
          var pathname = CATEGORY_PAGE_KEYS[pageKey];
          if (pathname && window.__peedeeCategorySeo && window.__peedeeCategorySeo[pathname]) {
            return window.__peedeeCategorySeo[pathname];
          }
          return null;
        }

        function refreshRouteSeo(pageKey) {
          if (isBlogPath()) {
            refreshBlogSeoFromPath();
            return;
          }
          var categorySeo = categorySeoFromPathname() || categorySeoFromPageKey(pageKey);
          if (categorySeo) {
            applySeoConfig(categorySeo);
            return;
          }
          applySeoConfig(defaultSeo);
        }

        function absoluteUrl(relative) {
          if (!relative) return DEFAULT_OG_IMAGE;
          if (/^https?:\/\//i.test(relative)) return relative;
          return ORIGIN + (relative.charAt(0) === "/" ? "" : "/") + relative;
        }

        function setMeta(attr, key, value) {
          if (!value) return;
          var selector = attr === "property" ? 'meta[property="' + key + '"]' : 'meta[name="' + key + '"]';
          var node = document.querySelector(selector);
          if (!node) {
            node = document.createElement("meta");
            if (attr === "property") node.setAttribute("property", key);
            else node.setAttribute("name", key);
            document.head.appendChild(node);
          }
          node.setAttribute("content", value);
        }

        function setCanonical(href) {
          if (!href) return;
          var node = document.querySelector('link[rel="canonical"]');
          if (!node) {
            node = document.createElement("link");
            node.setAttribute("rel", "canonical");
            document.head.appendChild(node);
          }
          node.setAttribute("href", href);
        }

        function applySeoConfig(config) {
          if (!config) return;
          document.title = config.title;
          setMeta("name", "title", config.title);
          setMeta("name", "description", config.description);
          setCanonical(config.canonical);
          setMeta("property", "og:type", config.ogType || "website");
          setMeta("property", "og:url", config.canonical);
          setMeta("property", "og:title", config.title);
          setMeta("property", "og:description", config.description);
          setMeta("property", "og:image", config.ogImage || DEFAULT_OG_IMAGE);
          setMeta("name", "twitter:url", config.canonical);
          setMeta("name", "twitter:title", config.title);
          setMeta("name", "twitter:description", config.description);
          setMeta("name", "twitter:image", config.ogImage || DEFAULT_OG_IMAGE);
        }

        function buildPostSeo(post) {
          return {
            title: post.seoTitle || post.title + " | The Daily Wag | Pee Dee Pet Care",
            description: post.excerpt || SITE_DESCRIPTION,
            canonical: ORIGIN + "/blog/" + post.slug,
            ogImage: absoluteUrl(post.coverImage),
            ogType: "article",
          };
        }

        function buildBlogIndexSeo() {
          return {
            title: BLOG_INDEX_TITLE,
            description: BLOG_INDEX_DESCRIPTION,
            canonical: ORIGIN + "/blog",
            ogImage: DEFAULT_OG_IMAGE,
            ogType: "website",
          };
        }

        function blogAssetUrl(src, version) {
          if (!src) return src;
          if (!version) return src;
          var joiner = src.indexOf("?") === -1 ? "?" : "&";
          return src + joiner + "v=" + encodeURIComponent(version);
        }

        function loadPosts() {
          if (!postsPromise) {
            postsPromise = fetch("/blog/posts.json", { cache: "no-store" })
              .then(function (res) {
                return res.ok ? res.json() : { posts: [] };
              })
              .then(function (data) {
                return Array.isArray(data.posts) ? data.posts : [];
              })
              .catch(function () {
                return [];
              });
          }
          return postsPromise;
        }

        function blogSlugFromPath() {
          var pathname = window.location.pathname.replace(/\/$/, "") || "/";
          if (pathname.indexOf("/blog/") === 0 && pathname.length > 6) {
            return decodeURIComponent(pathname.slice(6));
          }
          return null;
        }

        function isBlogPath() {
          var pathname = window.location.pathname.replace(/\/$/, "") || "/";
          return pathname === "/blog" || pathname.indexOf("/blog/") === 0;
        }

        function refreshBlogSeoFromPath() {
          if (!isBlogPath()) return;
          var slug = blogSlugFromPath();
          if (!slug) {
            applySeoConfig(buildBlogIndexSeo());
            return;
          }
          loadPosts().then(function (posts) {
            var post = posts.find(function (item) {
              return item.slug === slug;
            });
            applySeoConfig(post ? buildPostSeo(post) : buildBlogIndexSeo());
          });
        }

        window.__peedeeApplyBlogSeo = function (post) {
          if (post) {
            applySeoConfig(buildPostSeo(post));
            return;
          }
          if (isBlogPath()) {
            refreshBlogSeoFromPath();
            return;
          }
          refreshRouteSeo();
        };

        window.__peedeeRestoreDefaultSeo = function () {
          refreshRouteSeo();
        };

        window.__peedeeRefreshRouteSeo = refreshRouteSeo;

        window.__peedeeLoadBlogPosts = loadPosts;

        function preloadBlogImages(posts, slug) {
          if (!Array.isArray(posts) || !posts.length) return;
          posts.slice(0, 4).forEach(function (post, index) {
            if (post.coverImage && index < 4) {
              var cover = new Image();
              cover.decoding = "async";
              cover.src = blogAssetUrl(post.coverImage, post.dateModified || post.date);
            }
          });
          if (!slug) return;
          var selected = posts.find(function (post) {
            return post.slug === slug;
          });
          if (!selected || !Array.isArray(selected.blocks)) return;
          var version = selected.dateModified || selected.date;
          selected.blocks.forEach(function (block) {
            if (block.type === "img" && block.src) {
              var img = new Image();
              img.decoding = "async";
              img.src = blogAssetUrl(block.src, version);
            }
          });
        }

        if (isBlogPath()) {
          var earlySlug = blogSlugFromPath();
          loadPosts().then(function (posts) {
            preloadBlogImages(posts, earlySlug);
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          refreshRouteSeo();
        });
        window.addEventListener("popstate", function () {
          refreshRouteSeo();
        });
      })();
    </script>
